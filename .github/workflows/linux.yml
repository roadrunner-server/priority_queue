name: tests

on: [push, pull_request]

jobs:
  golang:
    name: Build (Go ${{ matrix.go }}, OS ${{matrix.os}})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        go: [stable]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6 # action page: <https://github.com/actions/setup-go>
        with:
          go-version: ${{ matrix.go }}

      - name: Check out code
        uses: actions/checkout@v6

      - name: Init Go modules Cache # Docs: <https://git.io/JfAKn#go---modules>
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install Go dependencies
        run: go mod download

      - name: Run golang tests with coverage
        run: |
          mkdir ./coverage
          go test -v -race -cover -tags=debug -coverpkg=./... -coverprofile=./coverage/pq-${{ matrix.os }}.out -covermode=atomic ./...

      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: pq-${{ matrix.os }}
          path: ./coverage/pq-${{ matrix.os }}.out

  codecov:
    name: Upload codecov
    runs-on: ubuntu-latest
    needs:
      - golang

    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Download code coverage results
        uses: actions/download-artifact@v8
        with:
          name: pq-ubuntu-latest
          path: coverage

      - name: Prepare coverage report
        run: |
          echo 'mode: atomic' > summary.txt
          tail -q -n +2 coverage/*.out >> summary.txt
          awk '
            NR == 1 { print; next }
            /^github\.com\/roadrunner-server\/priority_queue\// {
              sub(/^github\.com\/roadrunner-server\/priority_queue\//, "", $0)
              print
            }
          ' summary.txt > summary.filtered.txt
          mv summary.filtered.txt summary.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: summary.txt
          fail_ci_if_error: false
